# ── BOOTSTRAP CONFIG — used ONCE to obtain the first TLS certificate ────
# Serves the app over plain HTTP and answers the Let's Encrypt ACME
# challenge. nginx cannot start with the real nginx.conf until the
# certificate files exist, so this runs first. See README ("Enabling HTTPS").
#
#   docker compose -f docker-compose.yml -f docker-compose.bootstrap.yml up -d
#   ...run certbot...
#   docker compose up -d          # switches back to the HTTPS nginx.conf

worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout 65;

    client_max_body_size 15m;

    upstream frontend_upstream { server client:80; }
    upstream backend_upstream  { server server:5000; }

    server {
        listen 80 default_server;
        server_name goldenalsham.com www.goldenalsham.com;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # ACME challenge — Certbot writes files here, must stay on plain HTTP
        location ^~ /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # /admin: browser navigations → SPA, API calls → backend
        location ~ ^/admin(/|$) {
            if ($http_accept ~* text/html) { return 418; }
            error_page 418 = @spa;
            proxy_pass http://backend_upstream;
        }

        location ~ ^/(api|auth|getUser|user)(/|$) {
            proxy_pass http://backend_upstream;
        }

        location /socket.io/ {
            proxy_pass http://backend_upstream;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        location /    { proxy_pass http://frontend_upstream; }
        location @spa { proxy_pass http://frontend_upstream; }
    }
}
