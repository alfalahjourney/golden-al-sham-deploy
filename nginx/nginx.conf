worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout 65;

    # Voucher / visa uploads (frontend caps each file at 10MB)
    client_max_body_size 15m;

    # Upstreams = service names in docker-compose.yml
    upstream frontend_upstream { server client:80; }
    upstream backend_upstream  { server server:5000; }

    server {
        listen 80 default_server;
        server_name _;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # ── /admin: shared prefix ───────────────────────────────────────
        # /admin/* is BOTH a backend API namespace AND a React Router page
        # namespace. Split by request type: a browser navigation (page load
        # or reload) sends "Accept: text/html" → serve the SPA so client-side
        # routes like /admin/dashboard resolve; an XHR/API call sends
        # application/json (no text/html) → backend.
        location ~ ^/admin(/|$) {
            if ($http_accept ~* text/html) { return 418; }
            error_page 418 = @spa;
            proxy_pass http://backend_upstream;
        }

        # ── Backend-only prefixes (no frontend page routes here) ─────────
        location ~ ^/(api|auth|getUser|user)(/|$) {
            proxy_pass http://backend_upstream;
        }

        # Socket.IO / WebSocket upgrade
        location /socket.io/ {
            proxy_pass http://backend_upstream;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ── React SPA (everything else, incl. /admin page navigations) ───
        location / {
            proxy_pass http://frontend_upstream;
        }

        location @spa {
            proxy_pass http://frontend_upstream;
        }
    }
}
