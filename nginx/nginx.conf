worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout 65;

    # Voucher / visa uploads (frontend caps each file at 10MB)
    client_max_body_size 15m;

    # Upstreams = service names in docker-compose.yml
    upstream frontend_upstream { server client:80; }
    upstream backend_upstream  { server server:5000; }

    # ── HTTP :80 — ACME challenge + redirect everything else to HTTPS ────
    server {
        listen 80 default_server;
        server_name goldenalsham.com www.goldenalsham.com;

        # Must stay on plain HTTP for certificate renewals to succeed
        location ^~ /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS :443 — the real app ────────────────────────────────────────
    server {
        listen 443 ssl default_server;
        http2 on;
        server_name goldenalsham.com www.goldenalsham.com;

        ssl_certificate     /etc/letsencrypt/live/goldenalsham.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/goldenalsham.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        # Now resolves to "https" — the backend uses this to mark cookies
        # Secure and to build absolute links.
        proxy_set_header X-Forwarded-Proto $scheme;

        # ── /admin: shared prefix ───────────────────────────────────────
        # /admin/* is BOTH a backend API namespace AND a React Router page
        # namespace. Split by request type: a browser navigation (page load
        # or reload) sends "Accept: text/html" → serve the SPA so client-side
        # routes like /admin/dashboard resolve; an XHR/API call sends
        # application/json (no text/html) → backend.
        location ~ ^/admin(/|$) {
            if ($http_accept ~* text/html) { return 418; }
            error_page 418 = @spa;
            proxy_pass http://backend_upstream;
        }

        # ── Backend-only prefixes (no frontend page routes here) ─────────
        location ~ ^/(api|auth|getUser|user)(/|$) {
            proxy_pass http://backend_upstream;
        }

        # Socket.IO / WebSocket upgrade (wss:// over TLS)
        location /socket.io/ {
            proxy_pass http://backend_upstream;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ── React SPA (everything else, incl. /admin page navigations) ───
        location / {
            proxy_pass http://frontend_upstream;
        }

        location @spa {
            proxy_pass http://frontend_upstream;
        }
    }
}
