worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout 65;

    # Voucher / visa uploads (frontend caps each file at 10MB)
    client_max_body_size 15m;

    # Upstreams = service names in docker-compose.yml
    upstream frontend_upstream { server client:80; }
    upstream backend_upstream  { server server:5000; }

    # ── Single entry point: everything served from one origin ───────────
    # Backend route prefixes go to Express; everything else to the React
    # SPA. For a domain later: change server_name to your.domain and add a
    # second "listen 443 ssl;" block (Certbot).
    server {
        listen 80 default_server;
        server_name _;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Backend (Express) route prefixes
        location ~ ^/(admin|api|auth|getUser|user)(/|$) {
            proxy_pass http://backend_upstream;
        }

        # Socket.IO / WebSocket upgrade
        location /socket.io/ {
            proxy_pass http://backend_upstream;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # React SPA (everything else)
        location / {
            proxy_pass http://frontend_upstream;
        }
    }
}
